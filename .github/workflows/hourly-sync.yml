name: Hourly Blog Backup Sync

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Sync new blog posts
        env:
          GOOGLE_OAUTH_TOKEN_JSON: ${{ secrets.GOOGLE_OAUTH_TOKEN_JSON }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ vars.NOTION_DATABASE_ID }}
          GOOGLE_DRIVE_PARENT_ID: ${{ vars.GOOGLE_DRIVE_PARENT_ID }}
          MIN_IMAGE_BYTES: ${{ vars.MIN_IMAGE_BYTES }}
          MAX_DOWNLOAD_WORKERS: ${{ vars.MAX_DOWNLOAD_WORKERS }}
        run: python sync_new_blog_posts.py --sync-notion

      - name: Commit updated blog posts
        shell: bash
        run: |
          if git diff --quiet -- blog_posts.json; then
            echo "No blog_posts.json changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add blog_posts.json
          git commit -m "chore: sync blog posts"
          git push
